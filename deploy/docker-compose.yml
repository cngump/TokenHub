services:
  tokenhub-backend:
    container_name: tokenhub-backend
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    restart: unless-stopped
    environment:
      TOKENHUB_ENV: ${TOKENHUB_ENV:-prod}
      TOKENHUB_HTTP_ADDR: :8080
      TOKENHUB_PUBLIC_BASE_URL: ${TOKENHUB_PUBLIC_BASE_URL:-http://localhost:8080}
      TOKENHUB_TRUSTED_PROXY_CIDRS: ${TOKENHUB_TRUSTED_PROXY_CIDRS:-}
      TOKENHUB_ADMIN_TOKEN: ${TOKENHUB_ADMIN_TOKEN:-change-me-tokenhub-admin-token}
      TOKENHUB_BOOTSTRAP_ADMIN_PASSWORD: ${TOKENHUB_BOOTSTRAP_ADMIN_PASSWORD:-change-me-tokenhub-admin-password}
      TOKENHUB_SECRET_KEY: ${TOKENHUB_SECRET_KEY:-change-me-tokenhub-secret-key}
      TOKENHUB_DATABASE_URL: sqlite:///app/data/tokenhub.db
      TOKENHUB_SQLITE_BACKUP_DIR: /app/data/backups
      TOKENHUB_MODEL_CATALOG_FILE: /app/catalog/model-catalog.yaml
      TOKENHUB_SEED_DEMO: ${TOKENHUB_SEED_DEMO:-false}
      TOKENHUB_LOG_LEVEL: ${TOKENHUB_LOG_LEVEL:-info}
      TOKENHUB_RESOURCE_FAILURE_THRESHOLD: ${TOKENHUB_RESOURCE_FAILURE_THRESHOLD:-3}
      TOKENHUB_RESOURCE_COOLDOWN_SECONDS: ${TOKENHUB_RESOURCE_COOLDOWN_SECONDS:-300}
    ports:
      - "${TOKENHUB_BACKEND_PORT:-8080}:8080"
    volumes:
      - tokenhub-data:/app/data
      - ../data/model-catalog.yaml:/app/catalog/model-catalog.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - tokenhub

  tokenhub-frontend:
    container_name: tokenhub-frontend
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-TokenHub}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-TokenHub}
    ports:
      - "${TOKENHUB_FRONTEND_PORT:-3000}:3000"
    depends_on:
      tokenhub-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tokenhub

volumes:
  tokenhub-data:
    name: tokenhub-data

networks:
  tokenhub:
    name: tokenhub
