services:
  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      TOKENHUB_ENV: dev
      TOKENHUB_HTTP_ADDR: :8080
      TOKENHUB_PUBLIC_BASE_URL: http://localhost:8080
      TOKENHUB_ADMIN_TOKEN: dev_admin_token
      TOKENHUB_DATABASE_URL: sqlite:///app/data/tokenhub.db
    ports:
      - "8080:8080"
    volumes:
      - tokenhub-data:/app/data

  frontend:
    build:
      context: ../../frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_ADMIN_TOKEN: dev_admin_token
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  tokenhub-data:
