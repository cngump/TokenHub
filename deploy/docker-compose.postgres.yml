services:
  tokenhub-postgres:
    container_name: tokenhub-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tokenhub}
      POSTGRES_USER: ${POSTGRES_USER:-tokenhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - tokenhub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tokenhub} -d ${POSTGRES_DB:-tokenhub}"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - tokenhub

  tokenhub-backend:
    container_name: tokenhub-backend
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    restart: unless-stopped
    environment:
      TOKENHUB_ENV: ${TOKENHUB_ENV:-prod}
      TOKENHUB_HTTP_ADDR: :8080
      TOKENHUB_PUBLIC_BASE_URL: ${TOKENHUB_PUBLIC_BASE_URL:-http://localhost:8080}
      TOKENHUB_TRUSTED_PROXY_CIDRS: ${TOKENHUB_TRUSTED_PROXY_CIDRS:-}
      TOKENHUB_CORS_ALLOWED_ORIGINS: ${TOKENHUB_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      TOKENHUB_ADMIN_TOKEN: ${TOKENHUB_ADMIN_TOKEN:-change-me-tokenhub-admin-token}
      TOKENHUB_BOOTSTRAP_ADMIN_PASSWORD: ${TOKENHUB_BOOTSTRAP_ADMIN_PASSWORD:-change-me-tokenhub-admin-password}
      TOKENHUB_SECRET_KEY: ${TOKENHUB_SECRET_KEY:-change-me-tokenhub-secret-key}
      # Use TOKENHUB_DATABASE_URL if provided; otherwise construct from separate fields.
      # Separate fields avoid URL-encoding issues when passwords contain special characters (#?%/).
      TOKENHUB_DATABASE_URL: ${TOKENHUB_DATABASE_URL:-}
      TOKENHUB_DB_HOST: ${TOKENHUB_DB_HOST:-tokenhub-postgres}
      TOKENHUB_DB_PORT: ${TOKENHUB_DB_PORT:-5432}
      TOKENHUB_DB_USER: ${TOKENHUB_DB_USER:-${POSTGRES_USER:-tokenhub}}
      TOKENHUB_DB_PASSWORD: ${TOKENHUB_DB_PASSWORD:-${POSTGRES_PASSWORD:-change-me-postgres-password}}
      TOKENHUB_DB_NAME: ${TOKENHUB_DB_NAME:-${POSTGRES_DB:-tokenhub}}
      TOKENHUB_DB_SSLMODE: ${TOKENHUB_DB_SSLMODE:-disable}
      TOKENHUB_MODEL_CATALOG_FILE: /app/catalog/model-catalog.yaml
      TOKENHUB_SEED_DEMO: ${TOKENHUB_SEED_DEMO:-false}
      TOKENHUB_LOG_LEVEL: ${TOKENHUB_LOG_LEVEL:-info}
      TOKENHUB_RESOURCE_FAILURE_THRESHOLD: ${TOKENHUB_RESOURCE_FAILURE_THRESHOLD:-3}
      TOKENHUB_RESOURCE_COOLDOWN_SECONDS: ${TOKENHUB_RESOURCE_COOLDOWN_SECONDS:-300}
      TOKENHUB_IN_FLIGHT_LEASE_TTL_SECONDS: ${TOKENHUB_IN_FLIGHT_LEASE_TTL_SECONDS:-300}
      TOKENHUB_CLUSTER_LOCK_TTL_SECONDS: ${TOKENHUB_CLUSTER_LOCK_TTL_SECONDS:-180}
      TOKENHUB_GRACEFUL_SHUTDOWN_SECONDS: ${TOKENHUB_GRACEFUL_SHUTDOWN_SECONDS:-150}
      TOKENHUB_DB_MAX_OPEN_CONNS: ${TOKENHUB_DB_MAX_OPEN_CONNS:-25}
      TOKENHUB_DB_MAX_IDLE_CONNS: ${TOKENHUB_DB_MAX_IDLE_CONNS:-5}
      TOKENHUB_DB_CONN_MAX_LIFETIME_MINUTES: ${TOKENHUB_DB_CONN_MAX_LIFETIME_MINUTES:-30}
    ports:
      - "${TOKENHUB_BACKEND_PORT:-8080}:8080"
    volumes:
      - ../data/model-catalog.yaml:/app/catalog/model-catalog.yaml:ro
    depends_on:
      tokenhub-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    stop_grace_period: ${TOKENHUB_STOP_GRACE_PERIOD:-180s}
    networks:
      - tokenhub

  tokenhub-frontend:
    container_name: tokenhub-frontend
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-TokenHub}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-TokenHub}
    ports:
      - "${TOKENHUB_FRONTEND_PORT:-3000}:3000"
    depends_on:
      tokenhub-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tokenhub

volumes:
  tokenhub-postgres-data:
    name: tokenhub-postgres-data

networks:
  tokenhub:
    name: tokenhub
