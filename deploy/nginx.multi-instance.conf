resolver 127.0.0.11 valid=5s ipv6=off;

map $http_x_forwarded_proto $tokenhub_forwarded_proto {
    default $scheme;
    ~*^http$ http;
    ~*^https$ https;
}

server {
    listen 8080;
    server_name _;

    client_max_body_size 32m;

    location = /gateway-healthz {
        access_log off;
        return 200 "ok\n";
    }

    location ~ ^/(api|v1|healthz|readyz|livez)(/|$) {
        set $tokenhub_backend http://tokenhub-backend:8080;
        proxy_pass $tokenhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tokenhub_forwarded_proto;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location / {
        set $tokenhub_frontend http://tokenhub-frontend:3000;
        proxy_pass $tokenhub_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tokenhub_forwarded_proto;
        proxy_read_timeout 60s;
    }
}
